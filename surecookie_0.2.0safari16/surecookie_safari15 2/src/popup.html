<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SureCookie</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>SureCookie</h1>
    <p class="subtitle">Cookie Auto-Acceptor</p>
    
    <div class="setting">
      <label for="toggle-enabled">
        <span class="label-text">Extension Enabled</span>
        <input type="checkbox" id="toggle-enabled" class="toggle-switch">
      </label>
    </div>

    <div class="setting">
      <label for="toggle-auto-accept">
        <span class="label-text">Auto-Accept Cookies</span>
        <input type="checkbox" id="toggle-auto-accept" class="toggle-switch">
      </label>
    </div>

    <div class="info">
      <p>When enabled, SureCookie will automatically click cookie acceptance buttons on websites.</p>
    </div>

    <div class="footer">
      <small>SureCookie v1.0.0</small>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
